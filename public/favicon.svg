<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Main background gradient: blue → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <!-- Subtle inner glow on the bolt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top-left sheen -->
  <rect width="32" height="32" rx="7" fill="url(#sheen)" opacity="0.15"/>
  <defs>
    <radialGradient id="sheen" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Zap bolt — crisp, centred, slightly softly glowing -->
  <path
    d="M18.5 4.5 L10 17.5 H16.5 L13.5 27.5 L23 14 H16.5 Z"
    fill="white"
    filter="url(#glow)"
  />
</svg>
